services:

  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    container_name: web_api
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=appdb
      - DB_PORT=5432
    depends_on:
      db:
        condition: service_healthy
    networks:
      app_network:
        ipv4_address: 192.168.50.10
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    build:
      context: ./database
      dockerfile: dockerfile
    container_name: postgres_db
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      app_network:
        ipv4_address: 192.168.50.20
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local

networks:
  app_network:
    driver: ipvlan
    driver_opts:
      parent: eth0          # Change to your host interface (eth0, ens0, wlan0, etc.)
    ipam:
      config:
        - subnet: 192.168.50.0/24
          gateway: 192.168.50.1